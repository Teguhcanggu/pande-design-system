<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pande Homestay Canggu · Boutique Stay Near Batu Bolong Beach, Bali</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="site.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<a class="skip" href="#main">Skip to content</a>
<div id="root"></div>

<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Rooms.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;
  const { PandeHeader, PandeFooter, PandeWhatsApp, PandeGrain, PandeHome, PandeRooms } = window;

  function App() {
    const [page, setPage] = useState('home');
    const [lang, setLang] = useState('EN');

    const go = (id) => {
      if (id === 'rooms' || id === 'experience') { setPage('rooms'); window.scrollTo({ top: 0 }); return; }
      // home + in-page anchors
      setPage('home');
      const scrollTo = (sel) => requestAnimationFrame(() => {
        const el = document.querySelector(sel);
        if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 70, behavior: 'smooth' });
        else window.scrollTo({ top: 0 });
      });
      if (id === 'book') scrollTo('#book');
      else if (id === 'story') scrollTo('#belong');
      else if (id === 'contact') scrollTo('footer.site');
      else window.scrollTo({ top: 0 });
    };

    const navPage = page === 'rooms' ? 'rooms' : 'home';
    return (
      <React.Fragment>
        <PandeHeader page={navPage} go={go} lang={lang} setLang={setLang} />
        {page === 'rooms' ? <PandeRooms go={go} /> : <PandeHome go={go} />}
        <PandeFooter go={go} />
        <PandeWhatsApp />
        <PandeGrain />
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
