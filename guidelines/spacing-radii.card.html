<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radii" subtitle="10 inputs · 14 small cards · 16 cards/rooms · 18 panels · pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{padding:22px;background:var(--chalk);display:flex;gap:18px;align-items:flex-end}
  .box{background:var(--chalk-deep);border:1px solid var(--line);width:84px;height:64px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:.4rem}
  .box span{font-family:var(--font-body);font-size:.66rem;color:var(--earth-soft)}
  .pill{width:120px;border-radius:var(--r-pill)}
</style>
</head>
<body>
  <div class="box" style="border-radius:var(--r-sm)"><span>10 · sm</span></div>
  <div class="box" style="border-radius:var(--r-md)"><span>14 · md</span></div>
  <div class="box" style="border-radius:var(--r-lg)"><span>16 · lg</span></div>
  <div class="box" style="border-radius:var(--r-xl)"><span>18 · xl</span></div>
  <div class="box pill"><span>pill · 999</span></div>
</body>
</html>
