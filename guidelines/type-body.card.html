<!-- @dsCard group="Type" viewport="700x220" name="Body — Work Sans" subtitle="All UI, labels, prices — weights 300–600" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{padding:24px;background:var(--chalk);font-family:var(--font-body)}
  .lead{font-size:1.06rem;color:var(--earth-soft);font-weight:300;max-width:52ch;line-height:1.6}
  .stack{display:flex;gap:1.6rem;margin-top:1rem;flex-wrap:wrap}
  .stack span{color:var(--earth)}
  .w3{font-weight:300}.w4{font-weight:400}.w5{font-weight:500}.w6{font-weight:600}
  .specs{font-family:var(--font-body);font-size:.72rem;color:var(--earth-soft);letter-spacing:.06em;margin-top:1rem}
</style>
</head>
<body>
  <p class="lead">A 13-room homestay tucked just minutes from Batu Bolong Beach — comfort, a shared kitchen, and real Balinese warmth.</p>
  <div class="stack">
    <span class="w3">Light 300</span>
    <span class="w4">Regular 400</span>
    <span class="w5">Medium 500</span>
    <span class="w6">Semibold 600</span>
  </div>
  <div class="specs">Work Sans · 300 / 400 / 500 / 600 · line-height 1.6</div>
</body>
</html>
