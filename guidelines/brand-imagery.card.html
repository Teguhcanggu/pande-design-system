<!-- @dsCard group="Brand" viewport="700x190" name="Imagery & Grain" subtitle="Warm filmic photos, dusk tones, ~5% multiply grain overlay" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{padding:20px;background:var(--chalk);display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .tile{position:relative;height:138px;border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .tile img{width:100%;height:100%;object-fit:cover}
  .tile .g{position:absolute;inset:0;opacity:.06;mix-blend-mode:multiply}
  .cap{position:absolute;left:.5rem;bottom:.5rem;font-family:var(--font-body);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.6)}
</style>
</head>
<body>
  <div class="tile"><img src="../assets/img/hero-courtyard.webp" alt="Courtyard at dusk" /><span class="cap">Courtyard</span></div>
  <div class="tile"><img src="../assets/img/room-java-wooden-house.webp" alt="Wooden house room" /><span class="cap">Rooms</span></div>
  <div class="tile"><img src="../assets/img/kitchen.webp" alt="Shared kitchen" /><span class="cap">Kitchen</span></div>
  <div class="tile"><img src="../assets/img/gallery-2.webp" alt="Property detail" /><span class="cap">Texture</span></div>
  <svg class="grain" style="position:fixed" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#n)"/></svg>
</body>
</html>
