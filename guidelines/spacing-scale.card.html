<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="Modular rhythm from .35rem to section bands" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{padding:22px;background:var(--chalk);display:flex;gap:16px;align-items:flex-end}
  .u{display:flex;flex-direction:column;align-items:center;gap:.4rem}
  .bar{background:var(--coral);width:26px;border-radius:4px}
  .u span{font-family:var(--font-body);font-size:.64rem;color:var(--earth-soft)}
</style>
</head>
<body>
  <div class="u"><div class="bar" style="height:14px"></div><span>1 · 6</span></div>
  <div class="u"><div class="bar" style="height:22px"></div><span>2 · 11</span></div>
  <div class="u"><div class="bar" style="height:32px"></div><span>3 · 16</span></div>
  <div class="u"><div class="bar" style="height:45px"></div><span>4 · 22</span></div>
  <div class="u"><div class="bar" style="height:64px"></div><span>5 · 32</span></div>
  <div class="u"><div class="bar" style="height:96px"></div><span>6 · 48</span></div>
</body>
</html>
