<!-- @dsCard group="Type" viewport="700x200" name="Display — Cormorant Garamond" subtitle="Oversized serif headlines, medium weight, italic for emphasis" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{padding:24px;background:var(--chalk)}
  .big{font-family:var(--font-display);font-weight:500;font-size:4.2rem;line-height:1.02;letter-spacing:-.01em;color:var(--earth)}
  .big em{font-style:italic;color:var(--coral)}
  .specs{font-family:var(--font-body);font-size:.72rem;color:var(--earth-soft);letter-spacing:.06em;margin-top:.7rem}
</style>
</head>
<body>
  <div class="big">Slow down, <em>belong</em></div>
  <div class="specs">Cormorant Garamond · 500 / 500 italic · clamp(2.4rem → 8rem) · line-height 1.04 · tracking −0.01em</div>
</body>
</html>
