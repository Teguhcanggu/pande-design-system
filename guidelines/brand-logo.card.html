<!-- @dsCard group="Brand" viewport="700x190" name="Logo" subtitle="Modern monoline homestay mark + Pande wordmark, coral doorway" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{padding:22px;background:var(--chalk);display:flex;gap:20px;align-items:center}
  .lock{display:flex;gap:.8rem;align-items:center;padding:1rem 1.3rem;border-radius:var(--r-md)}
  .on-light{background:var(--chalk);border:1px solid var(--line-soft)}
  .on-husk{background:var(--chalk-deep)}
  img{height:60px;width:auto}
  .wm{display:flex;flex-direction:column;gap:.18rem;line-height:1}
  .wm .mark{font-family:var(--font-display);font-size:1.9rem;font-weight:600;color:var(--earth)}
  .wm .sub{font-family:var(--font-body);font-size:.56rem;letter-spacing:.32em;text-transform:uppercase;font-weight:600;color:var(--sienna)}
</style>
</head>
<body>
  <div class="lock on-light">
    <img src="../assets/img/pande-mark.svg" alt="Pande Homestay emblem" />
    <span class="wm"><span class="mark">Pande</span><span class="sub">Homestay · Canggu</span></span>
  </div>
  <div class="lock on-husk">
    <img src="../assets/img/pande-mark.svg" alt="Pande Homestay emblem" />
    <span class="wm"><span class="mark">Pande</span><span class="sub">Homestay · Canggu</span></span>
  </div>
  <div class="lock on-light"><img src="../assets/img/pande-mark.svg" alt="Pande Homestay emblem" style="height:40px" /></div>
</body>
</html>
