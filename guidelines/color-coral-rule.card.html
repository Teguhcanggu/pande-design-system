<!-- @dsCard group="Colors" viewport="700x170" name="Coral Rule" subtitle="Accent only — CTAs, links, eyebrows, small rules. Never coral body text." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{padding:22px;background:var(--chalk);display:flex;gap:26px;align-items:center}
  .demo{flex:1}
  p.eyebrow{margin-bottom:.7rem}
  h3.t{font-family:var(--font-display);font-weight:500;font-size:2rem;color:var(--earth);line-height:1.05}
  h3.t em{font-style:italic;color:var(--coral)}
  .rule{display:flex;gap:.6rem;margin-top:.8rem}
  .do,.dont{font-family:var(--font-body);font-size:.74rem;padding:.4rem .7rem;border-radius:var(--r-pill)}
  .do{background:rgba(79,99,70,.14);color:var(--frond)}
  .dont{background:rgba(216,84,47,.12);color:var(--coral-deep);text-decoration:line-through}
</style>
</head>
<body>
  <div class="demo">
    <p class="eyebrow">Coral as signature</p>
    <h3 class="t">Headlines stay deep earth — coral <em>accents</em> the moment.</h3>
  </div>
  <div style="display:flex;flex-direction:column;gap:.55rem;width:190px">
    <span class="do">✓ Buttons & links</span>
    <span class="do">✓ Eyebrows & small rules</span>
    <span class="dont">Coral body text</span>
    <span class="dont">Coral as background field</span>
  </div>
</body>
</html>
