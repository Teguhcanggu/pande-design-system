<!-- @dsCard group="Colors" viewport="700x150" name="Warm Neutrals" subtitle="Coconut Husk, Aged Brick, Burnt Sienna, Banana Frond, Night Earth" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{padding:20px;background:var(--chalk)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .sw{border-radius:var(--r-md);overflow:hidden;border:1px solid var(--line-soft)}
  .chip{height:72px}
  .meta{padding:.45rem .55rem;background:#fff}
  .meta b{font-family:var(--font-body);font-weight:600;font-size:.74rem;display:block;color:var(--earth)}
  .meta span{font-family:var(--font-body);font-size:.66rem;color:var(--earth-soft)}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--chalk-deep)"></div><div class="meta"><b>Coconut Husk</b><span>#EAD9C0</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--brick)"></div><div class="meta"><b>Aged Brick</b><span>#C98A6A</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--sienna)"></div><div class="meta"><b>Burnt Sienna</b><span>#9E4A2C</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--frond)"></div><div class="meta"><b>Banana Frond</b><span>#4F6346</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--night)"></div><div class="meta"><b>Night Earth</b><span>#1C1510</span></div></div>
  </div>
</body>
</html>
